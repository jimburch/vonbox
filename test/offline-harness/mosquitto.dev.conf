# Away-from-home dev broker for the NFC Movie Box.
#
# This is the THROWAWAY laptop broker used when testing the full loop off the
# home LAN — e.g. on an iPhone hotspot, where there's no Synology and no Pi.
# The laptop runs both this broker AND test/offline-harness/mock_ha.py (the fake Home
# Assistant); the Pico connects to the laptop's hotspot IP on port 1883.
#
# It is NOT the production config — that's test/home-assistant/mosquitto.conf, which lives on
# the Synology, requires auth, and persists retained messages. This one is
# deliberately the opposite: open, ephemeral, noisy. Nothing here should ever
# be synced to the Synology.
#
# Run it (foreground, verbose) from the repo root:
#   mosquitto -c test/offline-harness/mosquitto.dev.conf -v
#
# Then in another terminal: python3 test/offline-harness/mock_ha.py
# Full runbook: docs/testing-away-from-home.md

# Bind ALL interfaces, not just loopback. The Pico is a separate host on the
# hotspot, so the broker has to be reachable on the laptop's LAN IP — a
# loopback-only listener would accept mock_ha.py (same machine) but silently
# refuse the Pico. 0.0.0.0 is fine here: private hotspot, throwaway broker.
listener 1883 0.0.0.0

# No auth. This is a private hotspot and a disposable broker, so we skip the
# password file entirely. The Pico still sends its secrets.py credentials on
# connect; with anonymous access allowed the broker simply ignores them — so
# the Pico needs NO code change to point at this broker vs. the Synology.
allow_anonymous true

# Ephemeral: don't write a .db, don't carry retained messages or sessions
# across restarts. Every run starts clean. (mock_ha.py re-publishes the
# retained idle state on connect, so a fresh Pico still finds a state to show.)
persistence false

# Log everything to the terminal so we can watch the conversation live —
# connections, subscriptions, and every publish — instead of tailing a file.
log_dest stdout
log_type all
