# Deployed FILE-BASED, not via the HA UI. On the HA Pi this file lives at
# /config/automations_vonbox/vonbox_play_movie.yaml and is loaded by
#   automation vonbox: !include_dir_list automations_vonbox/
# in configuration.yaml. Editing it through the HA UI is intentionally out of the
# loop: the UI's media picker rewrites play_media into a `media: { ... }` wrapper.
# Edit THIS file, then Developer Tools -> YAML -> Reload Automations.
#
# PLAYBACK MECHANISM (changed 2026-06-14): tvOS 26.5 broke pyatv's Companion
# app-list fetch (FetchLaunchableApplicationsEvent times out), which silently
# killed `select_source: Plex` and, with it, the whole Phase 1 cold-start path:
# nothing foregrounds Plex -> the Plex client never registers with the server ->
# play_media on the Plex client has no target. See home-assistant/core#171666.
# Workaround: launch Plex AND start the movie in ONE shot via Plex's deep-link URL
# scheme through media_player.play_media on the Apple TV itself
# (media_content_type: url). That routes through pyatv launch_app -- a DIFFERENT
# Companion command that tvOS 26.5 did NOT break -- and needs no Plex client
# registration at all. Caveat: the deep link only fires when the Apple TV is AWAKE
# at the home screen; it cannot wake a sleeping box and is a no-op from
# idle/screensaver. So we turn_on (which also wakes the TV + soundbar over CEC)
# and send `home` first, THEN fire the deep link.
id: play_movie_from_nfc_tap
alias: Play movie from NFC tap
description: >-
  Tap-to-play. Triggered by vonbox/nfc/tapped, looks up the Plex rating key from a
  UID->rating-key mapping, wakes the Apple TV, and plays the mapped movie via a
  Plex deep link. Handles cold (asleep), warm-but-elsewhere (on another app), and
  already-playing (re-tap is a soft no-op, never a restart). Publishes vonbox/state
  at each branch so the box's LED ring/buzzer reflect what happened.
triggers:
  - trigger: mqtt
    topic: vonbox/nfc/tapped
variables:
  # Bootstrap mapping. Add new tags here as their figurines arrive. Keep a UID in
  # BOTH maps when you add a tag (HA renders each variables: value as a template,
  # so flat string->string maps sidestep the native complex-type quirks).
  uid_to_rating_key:
    "045AED5ECD2A81": "190"   # The Super Mario Bros. Movie (NTAG inside the Mario Blu-ray box)
  uid_to_title:
    "045AED5ECD2A81": "The Super Mario Bros. Movie"
  uid: "{{ trigger.payload_json.uid | default('') }}"
  rating_key: "{{ uid_to_rating_key.get(uid, '') }}"
  title: "{{ uid_to_title.get(uid, none) }}"
  # Plex Media Server machine identifier -- the `server=` half of the deep link.
  # From `curl http://<plex>:32400/identity`. One server, so it's a constant.
  plex_machine_id: "e665330f66bf4ac955231fdb44f95287341d2864"
actions:
  # --- Guard 1: unknown tag ------------------------------------------------
  # No rating key for this UID. Log for the HA logbook AND tell the box so it can
  # flash the red error cue. Transient state -> not retained.
  - if:
      - condition: template
        value_template: "{{ rating_key == '' }}"
    then:
      - action: system_log.write
        data:
          level: warning
          message: "vonbox: unknown UID '{{ uid }}' — ignoring tap"
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'error','uid':uid,'title':none,'reason':'unknown_tag'} | to_json }}"
      - stop: Unknown UID

  # --- Guard 2: this movie is already the active session -------------------
  # Re-tap of the movie already playing/paused -> soft no-op, so a re-tap never
  # restarts it. Reads the LIVE Plex entity (ground truth); when a movie is
  # actually playing the Plex client IS registered, so this check is reliable.
  # The deep-link path may report media_content_id as a bare rating key ("190") or
  # a full path ("/library/metadata/190"); split('/')|last tolerates both. VERIFY
  # the real format on the first live play and tighten if needed.
  - if:
      - condition: template
        value_template: >-
          {{ states('media_player.plex_plex_for_apple_tv_apple_tv') in ['playing', 'paused']
             and (state_attr('media_player.plex_plex_for_apple_tv_apple_tv', 'media_content_id') | string).split('/') | last == rating_key | string }}
    then:
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'already_playing','uid':uid,'title':title,'reason':none} | to_json }}"
      - stop: Already playing this movie

  # --- Wake + play sequence ------------------------------------------------
  # Optimistic loading cue the instant we commit -- the ring animates through the
  # multi-second wake while the TV/soundbar come up over CEC. Transient.
  - action: mqtt.publish
    data:
      topic: vonbox/state
      payload: "{{ {'state':'loading','uid':uid,'title':title,'reason':none} | to_json }}"

  # Start-from-the-beginning: clear Plex's SERVER-SIDE resume point before playing,
  # via rest_command plex_mark_unwatched (Plex /:/unscrobble). The deep link's own
  # viewOffset is ignored by tvOS Plex, and media_seek isn't supported by this
  # client, so the server-side reset is the only lever that works. Fired before the
  # wake so the server settles by the time the deep link launches ~10s later. The
  # rest_command (and the X-Plex-Token) live in configuration.yaml on the Pi -- it
  # MUST be defined there or this aborts (a missing action is NOT caught by
  # continue_on_error). continue_on_error here only covers a runtime Plex failure:
  # a hiccup just means the movie resumes instead of restarting, never blocks the
  # play. Re-taps of the already-playing movie never reach here (Guard 2). ADR 0004.
  - action: rest_command.plex_mark_unwatched
    continue_on_error: true
    data:
      rating_key: "{{ rating_key }}"

  # 1) Power on. turn_on the Apple TV; the TV + soundbar follow over HDMI-CEC.
  - action: media_player.turn_on
    target:
      entity_id: media_player.living_room
  - wait_template: >-
      {{ states('media_player.living_room') not in
         ['off', 'standby', 'unknown', 'unavailable'] }}
    timeout: "00:00:15"
    continue_on_timeout: true
  - delay: "00:00:02"

  # 2) Go home. The deep link only fires from an awake/home-screen state, not from
  # idle/screensaver, so force the home screen first. remote.send_command uses
  # Companion HID, which tvOS 26.5 did NOT break.
  - action: remote.send_command
    target:
      entity_id: remote.living_room
    data:
      command: home
  - delay: "00:00:03"

  # 3) Launch Plex AND start the movie in one shot via the deep-link URL scheme.
  # Start-from-the-beginning is handled by the unscrobble above (the tvOS Plex app
  # ignores a viewOffset param in the URL). Keep the URL on ONE line -- a folded
  # multi-line scalar would inject spaces and corrupt the query string.
  - action: media_player.play_media
    target:
      entity_id: media_player.living_room
    data:
      media_content_type: url
      media_content_id: "plex://play/?metadataKey=/library/metadata/{{ rating_key }}&metadataType=1&server={{ plex_machine_id }}"

  # 4) Confirm. When the movie actually starts, the Plex client registers and goes
  # 'playing' -- our success signal. An active session registers fast, unlike the
  # idle case that never registered at all.
  - wait_template: >-
      {{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing' }}
    timeout: "00:00:45"
    continue_on_timeout: true
  - if:
      - condition: template
        value_template: "{{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing' }}"
    then:
      # Confirmed playing -> sustained 'playing'. NOT retained: a retained 'playing'
      # is redelivered to the box on every (re)subscribe, re-trumpeting success with
      # no tap and going stale when the movie ends. The box boots to idle and only
      # goes green on a live tap.
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'playing','uid':uid,'title':title,'reason':none} | to_json }}"
    else:
      # Never reached 'playing' within the window -> treat as a genuine failure
      # (most likely the box didn't wake in time). Box flashes the red error cue.
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'error','uid':uid,'title':title,'reason':'playback_failed'} | to_json }}"
mode: single
