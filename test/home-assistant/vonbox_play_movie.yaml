# Deployed FILE-BASED, not via the HA UI. On the HA Pi this file lives at
# /config/automations_vonbox/vonbox_play_movie.yaml and is loaded by
#   automation vonbox: !include_dir_list automations_vonbox/
# in configuration.yaml. Editing it through the HA UI is intentionally out of the
# loop: the UI's media picker rewrites play_media into a `media: { ... }` wrapper.
# Edit THIS file, then Developer Tools -> YAML -> Reload Automations.
#
# PLAYBACK MECHANISM (deep-link 2026-06-14, multi-source 2026-06-17): tvOS 26.5
# broke pyatv's Companion app-list fetch (FetchLaunchableApplicationsEvent times
# out), which silently killed `select_source` and the whole Phase 1 cold-start
# path. See home-assistant/core#171666. Workaround: launch the streaming app AND
# start the movie in ONE shot via a deep-link URL through media_player.play_media
# on the Apple TV (media_content_type: url). That routes through pyatv launch_app
# -- a DIFFERENT Companion command tvOS 26.5 did NOT break -- and needs no
# per-app client registration. The deep link can't wake a sleeping box, so we
# turn_on first (which also wakes the TV + soundbar over CEC). A `home` command
# used to sit between turn_on and play_media on the theory that the deep link
# no-ops from idle/screensaver -- dropped 2026-06-17 as a cold-start latency
# experiment; restore it if a screensaver / idle-state tap stops launching the
# app.
#
# Sources supported (the `source` variable below picks the branch):
#   plex         play_id = numeric Plex rating key. Resume cleared server-side
#                via rest_command.plex_mark_unwatched BEFORE play_media (tvOS
#                Plex ignores viewOffset in the URL; /:/unscrobble is the only
#                lever that resets the start point -- ADR 0004 / lesson #16).
#   disney_plus  play_id = full https://www.disneyplus.com/play/<id> URL. No
#                resume-clear lever (no public Disney+ unwatch API), so the
#                movie picks up wherever it was last left.
id: play_movie_from_nfc_tap
alias: Play movie from NFC tap
description: >-
  Tap-to-play. Triggered by vonbox/nfc/tapped, looks up the tag's source +
  play-id, wakes the Apple TV, and plays the mapped movie via a per-source deep
  link (Plex rating-key URL for Plex, https URL for Disney+). Handles cold
  (asleep), warm-but-elsewhere (on another app), and already-playing on Plex
  (re-tap is a soft no-op, never a restart). Publishes vonbox/state at each
  branch so the box's LED ring/buzzer reflect what happened.
triggers:
  - trigger: mqtt
    topic: vonbox/nfc/tapped
variables:
  # Bootstrap mapping. Add new tags here as their figurines arrive. Keep each
  # UID in ALL THREE maps -- they're parallel string->string dicts (HA renders
  # each variables: value as a template, so flat string->string maps sidestep
  # the native complex-type quirks). play_id format varies by source:
  #   plex         -> numeric Plex rating key, e.g. "190"
  #   disney_plus  -> full https://www.disneyplus.com/play/<id> URL
  uid_to_source:
    "045AED5ECD2A81": "plex"          # The Super Mario Bros. Movie (NTAG inside the Mario Blu-ray box)
    "044E4250CE2A81": "disney_plus"   # Frozen (2013)
  uid_to_play_id:
    "045AED5ECD2A81": "190"
    "044E4250CE2A81": "https://www.disneyplus.com/play/04c97b72-504b-47f2-9c6f-fe13d9aea82f"
  uid_to_title:
    "045AED5ECD2A81": "The Super Mario Bros. Movie"
    "044E4250CE2A81": "Frozen"
  uid: "{{ trigger.payload_json.uid | default('') }}"
  source: "{{ uid_to_source.get(uid, '') }}"
  play_id: "{{ uid_to_play_id.get(uid, '') }}"
  title: "{{ uid_to_title.get(uid, none) }}"
  # Plex Media Server machine identifier -- the `server=` half of the Plex deep
  # link. From `curl http://<plex>:32400/identity`. One server, so it's a constant.
  plex_machine_id: "e665330f66bf4ac955231fdb44f95287341d2864"
actions:
  # --- Guard 1: unknown tag ------------------------------------------------
  # No source mapped for this UID. Log for the HA logbook AND tell the box so
  # it can flash the red error cue. Transient state -> not retained.
  - if:
      - condition: template
        value_template: "{{ source == '' }}"
    then:
      - action: system_log.write
        data:
          level: warning
          message: "vonbox: unknown UID '{{ uid }}' — ignoring tap"
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'error','uid':uid,'title':none,'reason':'unknown_tag'} | to_json }}"
      - stop: Unknown UID

  # --- Guard 2a: Plex same-movie re-tap during active playback ------------
  # Re-tap of the Plex movie currently playing -> soft no-op. State must be
  # 'playing' (not 'paused' -- when the user switches to Disney+, the Plex
  # client entity can linger on 'paused' with a stale media_content_id, which
  # used to false-positive a re-tap of the previous Plex movie). The recency
  # check on media_position_updated_at is the real stale-state catcher:
  # position updates freeze the moment Plex loses foreground, so anything >60s
  # old means Plex isn't actually on screen even if state still reads
  # 'playing'. The deep-link path may report media_content_id as a bare rating
  # key ("190") or a full path ("/library/metadata/190"); split('/')|last
  # tolerates both.
  - if:
      - condition: template
        value_template: >-
          {{ source == 'plex'
             and states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing'
             and (state_attr('media_player.plex_plex_for_apple_tv_apple_tv', 'media_content_id') | string).split('/') | last == play_id | string
             and (as_timestamp(now()) - as_timestamp(state_attr('media_player.plex_plex_for_apple_tv_apple_tv', 'media_position_updated_at') | default(0))) < 60 }}
    then:
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'already_playing','uid':uid,'title':title,'reason':none} | to_json }}"
      - stop: Already playing this movie (Plex)

  # --- Guard 2b: Disney+ same-movie re-tap during active playback ---------
  # Mirror of Guard 2a, keyed on media_player.living_room (the Apple TV
  # entity). lesson #13 only broke the app-list / select_source path under
  # tvOS 26.5 -- the now-playing attributes (state, app_id,
  # media_content_id, media_position*) keep updating reliably. Disney+
  # reports media_content_id as just the UUID, so we compare against the
  # last path segment of play_id (full https URL).
  - if:
      - condition: template
        value_template: >-
          {{ source == 'disney_plus'
             and states('media_player.living_room') == 'playing'
             and state_attr('media_player.living_room', 'app_id') == 'com.disney.disneyplus'
             and state_attr('media_player.living_room', 'media_content_id') == (play_id | string).split('/') | last }}
    then:
      - action: mqtt.publish
        data:
          topic: vonbox/state
          payload: "{{ {'state':'already_playing','uid':uid,'title':title,'reason':none} | to_json }}"
      - stop: Already playing this movie (Disney+)

  # --- Wake ----------------------------------------------------------------
  # Optimistic loading cue the instant we commit -- the ring animates through
  # the multi-second wake while the TV/soundbar come up over CEC. Transient.
  - action: mqtt.publish
    data:
      topic: vonbox/state
      payload: "{{ {'state':'loading','uid':uid,'title':title,'reason':none} | to_json }}"

  # 1) Power on. turn_on the Apple TV; the TV + soundbar follow over HDMI-CEC.
  - action: media_player.turn_on
    target:
      entity_id: media_player.living_room
  - wait_template: >-
      {{ states('media_player.living_room') not in
         ['off', 'standby', 'unknown', 'unavailable'] }}
    timeout: "00:00:15"
    continue_on_timeout: true
  - delay: "00:00:02"

  # 2) Per-source play. Each branch builds the right deep-link URL and (for
  # Plex) clears the server resume point first. Keep each media_content_id on
  # ONE line -- a folded multi-line scalar injects spaces and corrupts the URL.
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ source == 'plex' }}"
        sequence:
          # Start-from-the-beginning: clear Plex's SERVER-SIDE resume point
          # before the deep link. /:/unscrobble (mark unwatched) is the only
          # lever that resets the start point -- the deep link's own viewOffset
          # is ignored by tvOS Plex, and media_seek isn't supported by this
          # client. The rest_command (and the X-Plex-Token) live in
          # configuration.yaml on the Pi -- it MUST be defined there or this
          # aborts (a missing action is NOT caught by continue_on_error -- see
          # lesson #17). continue_on_error here only covers a runtime Plex
          # failure: a hiccup just means the movie resumes instead of
          # restarting, never blocks the play. Re-taps of the already-playing
          # movie never reach here (Guard 2). ADR 0004 / lesson #16.
          - action: rest_command.plex_mark_unwatched
            continue_on_error: true
            data:
              rating_key: "{{ play_id }}"
          - action: media_player.play_media
            target:
              entity_id: media_player.living_room
            data:
              media_content_type: url
              media_content_id: "plex://play/?metadataKey=/library/metadata/{{ play_id }}&metadataType=1&server={{ plex_machine_id }}"
      - conditions:
          - condition: template
            value_template: "{{ source == 'disney_plus' }}"
        sequence:
          # Single-fire-with-retry pattern. tvOS Disney+ handles the deep
          # link differently by app warmth: a warm app plays the URL on the
          # first fire; a cold-launched app opens but drops the URL's
          # content portion (lands on Disney+ home). The earlier two-step
          # warm-up worked for cold but caused the player menu to bounce
          # in/out on warm taps (verified live 2026-06-17), because the
          # second fire re-navigated a session already playing the same
          # content. So we fire once here; the confirm step below watches
          # media_player.living_room for the live session signal and
          # re-fires only if it never lights up (cold case).
          - action: media_player.play_media
            target:
              entity_id: media_player.living_room
            data:
              media_content_type: url
              media_content_id: "{{ play_id }}"

  # 3) Confirm. Plex registers its client entity as 'playing' the moment the
  # movie actually starts -- a clean success signal. Disney+ has no equivalent
  # always-on entity (the Apple TV media_player's app-state is unreliable under
  # tvOS 26.5 -- lesson #13), so for Disney+ we wait a few seconds and publish
  # 'playing' optimistically. Trade-off: no 'error' cue if a Disney+ tap
  # silently fails to launch. Revisit if it bites.
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ source == 'plex' }}"
        sequence:
          - wait_template: >-
              {{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing' }}
            timeout: "00:00:45"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: "{{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing' }}"
            then:
              # Confirmed playing -> sustained 'playing'. NOT retained: a
              # retained 'playing' is redelivered to the box on every
              # (re)subscribe, re-trumpeting success with no tap and going
              # stale when the movie ends. The box boots to idle and only goes
              # green on a live tap.
              - action: mqtt.publish
                data:
                  topic: vonbox/state
                  payload: "{{ {'state':'playing','uid':uid,'title':title,'reason':none} | to_json }}"
            else:
              # Never reached 'playing' within the window -> treat as a genuine
              # failure (most likely the box didn't wake in time). Box flashes
              # the red error cue.
              - action: mqtt.publish
                data:
                  topic: vonbox/state
                  payload: "{{ {'state':'error','uid':uid,'title':title,'reason':'playback_failed'} | to_json }}"
      - conditions:
          - condition: template
            value_template: "{{ source == 'disney_plus' }}"
        sequence:
          # Step 1: short watch for the first fire to take. Warm Disney+
          # lights up within a few seconds; cold-launch Disney+ either takes
          # longer or drops the URL entirely. Live-session check uses
          # media_player.living_room (lesson #13 only broke select_source's
          # app-list, not now-playing attributes -- discovered 2026-06-17).
          # Disney+ reports media_content_id as the bare UUID, so we match
          # the last path segment of play_id.
          - wait_template: >-
              {{ states('media_player.living_room') == 'playing'
                 and state_attr('media_player.living_room', 'app_id') == 'com.disney.disneyplus'
                 and state_attr('media_player.living_room', 'media_content_id') == (play_id | string).split('/') | last }}
            timeout: "00:00:12"
            continue_on_timeout: true

          # Step 2: cold-launch retry. If the first fire didn't surface the
          # live Frozen session within 12s, Disney+ swallowed the URL on
          # cold launch -- by now the app is foregrounded (warm) so re-fire
          # and wait again.
          - if:
              - condition: template
                value_template: "{{ not wait.completed }}"
            then:
              - action: media_player.play_media
                target:
                  entity_id: media_player.living_room
                data:
                  media_content_type: url
                  media_content_id: "{{ play_id }}"
              - wait_template: >-
                  {{ states('media_player.living_room') == 'playing'
                     and state_attr('media_player.living_room', 'app_id') == 'com.disney.disneyplus'
                     and state_attr('media_player.living_room', 'media_content_id') == (play_id | string).split('/') | last }}
                timeout: "00:00:25"
                continue_on_timeout: true

          # Step 3: seek to 0 + publish state. Settle delay matters: a seek
          # fired the instant state flips to 'playing' lands while Disney+'s
          # transport overlay is still up, which tvOS Disney+ interprets as
          # a small relative skip (verified live 2026-06-17 -- the movie
          # only jumped back a few seconds). 5s gives the overlay time to
          # dim and the player to enter steady playback; the same seek_to_0
          # then lands as an absolute jump (manual Developer Tools test
          # 2026-06-17 confirmed this works on a settled player).
          - if:
              - condition: template
                value_template: "{{ wait.completed }}"
            then:
              - delay: "00:00:05"
              - action: media_player.media_seek
                target:
                  entity_id: media_player.living_room
                data:
                  seek_position: 0
              - action: mqtt.publish
                data:
                  topic: vonbox/state
                  payload: "{{ {'state':'playing','uid':uid,'title':title,'reason':none} | to_json }}"
            else:
              # Disney+ never became the live session, even after a retry
              # -- a real failure (cold launch lost the URL twice, network
              # hiccup, Apple TV stuck). Box flashes red.
              - action: mqtt.publish
                data:
                  topic: vonbox/state
                  payload: "{{ {'state':'error','uid':uid,'title':title,'reason':'playback_failed'} | to_json }}"
mode: single
