# Mosquitto config for the NFC Movie Box project.
# Lives on the Synology at /volume1/docker/mosquitto/config/mosquitto.conf
# (this file is the canonical copy; update here first, then sync to Synology).

# Listen on the standard MQTT port for unencrypted connections on the LAN.
# The Pico, HA, and the laptop all connect here.
listener 1883

# Persist subscriptions and retained messages across container restarts —
# means HA doesn't miss state if Mosquitto reboots.
persistence true
persistence_location /mosquitto/data/

# Log to a file we can tail if something misbehaves.
log_dest file /mosquitto/log/mosquitto.log

# Require username/password — never run an MQTT broker on a LAN without auth.
# The password file is populated via `mosquitto_passwd` after the container
# is up; see deploy notes in SPEC.md / CLAUDE.md.
allow_anonymous false
password_file /mosquitto/config/passwd
