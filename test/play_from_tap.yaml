alias: Play movie from NFC tap
description: Tap-to-play — look up UID from vonbox/nfc/tapped and run the Phase 1 cold-start sequence parameterised by Plex rating key.
triggers:
  - trigger: mqtt
    topic: vonbox/nfc/tapped
variables:
  # Bootstrap mapping. Add new tags here as their figurines arrive.
  uid_to_rating_key:
    "04462765C82A81": "190"   # The Super Mario Bros. Movie
  uid: "{{ trigger.payload_json.uid | default('') }}"
  rating_key: "{{ uid_to_rating_key.get(uid, '') }}"
actions:
  - if:
      - condition: template
        value_template: "{{ rating_key == '' }}"
    then:
      - action: system_log.write
        data:
          level: warning
          message: "vonbox: unknown UID '{{ uid }}' — ignoring tap"
      - stop: Unknown UID
  - target:
      entity_id: media_player.living_room
    action: media_player.turn_on
  - wait_template: |-
      {{ states('media_player.living_room') not in
         ['off', 'standby', 'unknown', 'unavailable'] }}
    timeout: "00:00:15"
    continue_on_timeout: true
  - delay: "00:00:02"
  - target:
      entity_id: media_player.living_room
    data:
      source: Plex
    action: media_player.select_source
  - wait_template: >-
      {{ states('media_player.plex_plex_for_apple_tv_apple_tv') in ['idle',
      'paused', 'playing'] }}
    timeout: "00:00:30"
  - delay: "00:00:08"
  # Warm up the Plex Companion session — sending any command forces the
  # control channel to re-establish before play_media. Without this, a stale
  # session will silently swallow the play_media call.
  - target:
      entity_id: media_player.plex_plex_for_apple_tv_apple_tv
    action: media_player.media_play
    continue_on_error: true
  - delay: "00:00:02"
  - repeat:
      sequence:
        - target:
            entity_id: media_player.plex_plex_for_apple_tv_apple_tv
          data:
            media_content_id: "{{ rating_key }}"
            media_content_type: movie
          action: media_player.play_media
        # Wait up to 15s for Plex to actually start playing. Only retry on
        # genuine timeout — a fixed delay was too short and caused duplicate
        # play_media calls when state hadn't flipped yet, which Plex
        # interpreted as "restart the movie."
        - wait_template: >-
            {{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing'
            and state_attr('media_player.plex_plex_for_apple_tv_apple_tv',
            'media_content_id') | string == rating_key }}
          timeout: "00:00:15"
          continue_on_timeout: true
        - if:
            - condition: template
              value_template: >-
                {{ states('media_player.plex_plex_for_apple_tv_apple_tv') == 'playing'
                and state_attr('media_player.plex_plex_for_apple_tv_apple_tv',
                'media_content_id') | string == rating_key }}
          then:
            - stop: Movie is playing
      until:
        - condition: template
          value_template: "{{ repeat.index >= 3 }}"
mode: single
